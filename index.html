<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --bg:#0c1310;--surface:#15211c;--surface2:#1b2a23;--border:rgba(180,205,192,0.11);
  --gold:#e7b35e;--gold-soft:#f3d49a;--teal:#62b6a6;--text:#ece6d8;--muted:#8b988f;
  --slow:#d99a5b;--good:#62b6a6;
}
body{
  font-family:'Noto Sans TC',sans-serif;color:var(--text);min-height:100vh;
  background:radial-gradient(120% 60% at 50% -10%,rgba(231,179,94,0.13),transparent 60%),
             radial-gradient(90% 50% at 100% 100%,rgba(98,182,166,0.08),transparent 55%),var(--bg);
  padding:calc(26px + env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));
}
.wrap{max-width:480px;margin:0 auto;}
.kicker{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:21px;margin-top:2px;letter-spacing:1px;}
.sub{font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:18px;}
.hero{background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--border);
  border-radius:20px;padding:24px 22px 22px;position:relative;overflow:hidden;
  box-shadow:0 18px 40px -22px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.03);animation:rise .5s ease both;}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;
  background:radial-gradient(circle,rgba(231,179,94,0.18),transparent 70%);pointer-events:none;}
.hero-label{font-size:12px;color:var(--muted);letter-spacing:2px;}
.total{font-family:'Space Mono',monospace;font-weight:700;font-size:clamp(38px,12vw,52px);line-height:1.05;margin-top:6px;color:var(--gold-soft);}
.total .cur{font-size:18px;color:var(--gold);margin-right:6px;vertical-align:6px;}
.hero-meta{display:flex;gap:18px;margin-top:14px;font-size:12px;color:var(--muted);}
.hero-meta b{color:var(--teal);font-family:'Space Mono',monospace;font-weight:700;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:14px;animation:rise .5s ease both;}
.card-t{font-size:12px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:1px;}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:11px;color:var(--text);
  padding:12px 13px;font-size:16px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s;}
.input:focus{border-color:var(--gold);}
.amt{font-family:'Space Mono',monospace;font-weight:700;font-size:22px;letter-spacing:1px;}
.row2{display:flex;gap:10px;}.row2>div{flex:1;}
.btn{width:100%;margin-top:5px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2607;font-weight:700;font-size:15px;
  padding:13px;letter-spacing:2px;font-family:'Noto Sans TC',sans-serif;transition:transform .08s,filter .15s;}
.btn:active{transform:scale(.985);filter:brightness(1.05);}
.legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:12px;}
.legend span{display:flex;align-items:center;gap:5px;}
.dot{width:8px;height:8px;border-radius:50%;flex:none;}
.mon{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.mon:last-child{border-bottom:none;}
.mon-name{font-weight:500;font-size:14px;min-width:42px;}
.mon-tag{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.mon-note{font-size:11px;color:var(--muted);flex:1;}
.mon-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--gold-soft);}
.entry{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.entry:last-child{border-bottom:none;}
.e-date{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);min-width:60px;}
.e-note{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.e-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--gold-soft);}
.x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;}
.del{display:flex;gap:6px;}
.del button{font-size:11px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;padding:5px 9px;cursor:pointer;}
.del .yes{color:#e88c6a;border-color:rgba(232,140,106,.4);}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:22px 10px;line-height:1.7;}
.backup{display:flex;gap:10px;}
.backup button{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:11px;
  padding:11px;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;}
.backup button:active{filter:brightness(1.2);}
.foot{text-align:center;font-size:11px;color:var(--muted);margin-top:22px;line-height:1.7;opacity:.85;}
.err{color:#e88c6a;font-size:12px;margin-top:8px;text-align:center;min-height:14px;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">外快投資基金</div>
  <div class="title">這桶水養多深了</div>
  <div class="sub">賺多買多 · 年底分批進場 · 只用閒錢</div>

  <div class="hero">
    <div class="hero-label">累計可投資金額</div>
    <div class="total"><span class="cur">NT$</span><span id="total">0</span></div>
    <div class="hero-meta"><div>共 <b id="count">0</b> 筆</div><div>本月 <b id="mtotal">0</b></div></div>
  </div>

  <div class="card">
    <div class="card-t">記一筆外快</div>
    <div class="field"><label>金額（NT$）</label>
      <input class="input amt" id="amount" inputmode="numeric" type="number" placeholder="0"></div>
    <div class="row2">
      <div class="field"><label>日期</label><input class="input" id="date" type="date"></div>
      <div class="field"><label>來源（選填）</label><input class="input" id="note" type="text" placeholder="如：接案"></div>
    </div>
    <button class="btn" id="addbtn">記 一 筆</button>
    <div class="err" id="err"></div>
  </div>

  <div class="card" id="months-card" style="display:none">
    <div class="card-t">每月進度</div>
    <div class="legend">
      <span><i class="dot" style="background:var(--good)"></i>順風月·火力全開</span>
      <span><i class="dot" style="background:var(--slow)"></i>低谷月·配速就好</span>
    </div>
    <div id="months"></div>
  </div>

  <div class="card">
    <div class="card-t">明細</div>
    <div id="list"><div class="empty">還沒有記錄。<br>接到第一筆外快，就記上來吧。</div></div>
  </div>

  <div class="card">
    <div class="card-t">備份</div>
    <div class="backup">
      <button id="exportbtn">匯出備份</button>
      <button id="importbtn">匯入</button>
    </div>
    <input type="file" id="importfile" accept="application/json,.json" style="display:none">
  </div>

  <div class="foot">
    資料只存在這支手機裡，不會上傳。建議偶爾「匯出備份」存一份。<br>
    外快若加總超過免稅門檻仍須申報，先留稅金／備用再算可投金額。
  </div>
</div>

const KEY='waikuai_fund_entries_v1';
const MONTH_PLAN={
 "2026-06":{label:"起跑",tone:"start",note:"定下外快、開專戶"},
 "2026-07":{label:"配速",tone:"slow",note:"低谷·維持別硬衝"},
 "2026-08":{label:"順風",tone:"good",note:"回血·拓案源"},
 "2026-09":{label:"順風",tone:"good",note:"最清醒·全力衝"},
 "2026-10":{label:"守穩",tone:"slow",note:"辰戌沖·別接糾紛案"},
 "2026-11":{label:"順風",tone:"good",note:"水幫身·最後衝刺"},
 "2026-12":{label:"主買",tone:"good",note:"分批進場開始"},
 "2027-01":{label:"收尾",tone:"good",note:"補最後一批"}
};
const MN=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const fmt=n=>Math.round(n).toLocaleString('en-US');
const $=id=>document.getElementById(id);
let entries=[],confirmId=null;
const setErr=m=>{$('err').textContent=m||'';};
function load(){try{const v=JSON.parse(localStorage.getItem(KEY)||'[]');entries=Array.isArray(v)?v:[];}catch(e){entries=[];}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(entries));}catch(e){setErr('儲存失敗（裝置空間可能不足）');}}
function render(){
  const total=entries.reduce((s,e)=>s+e.amount,0);
  const tm=todayStr().slice(0,7);
  const mt=entries.filter(e=>e.date.slice(0,7)===tm).reduce((s,e)=>s+e.amount,0);
  $('total').textContent=fmt(total);$('count').textContent=entries.length;$('mtotal').textContent=fmt(mt);
  const m={};entries.forEach(e=>{const k=e.date.slice(0,7);m[k]=(m[k]||0)+e.amount;});
  const keys=Object.keys(m).sort();
  if(keys.length===0){$('months-card').style.display='none';}
  else{$('months-card').style.display='';
    $('months').innerHTML=keys.map(k=>{const mo=parseInt(k.split('-')[1],10);const p=MONTH_PLAN[k];
      const tone=p?p.tone:'good';const c=tone==='slow'?'var(--slow)':tone==='start'?'var(--gold)':'var(--good)';
      const tag=p?'<span class="mon-tag">'+p.label+'</span>':'';const note=p?p.note:k.split('-')[0];
      return '<div class="mon"><span class="dot" style="background:'+c+'"></span><span class="mon-name">'+MN[mo-1]+'</span>'+tag+'<span class="mon-note">'+note+'</span><span class="mon-amt">'+fmt(m[k])+'</span></div>';}).join('');}
  const sorted=[...entries].sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:0);
  if(sorted.length===0){$('list').innerHTML='<div class="empty">還沒有記錄。<br>接到第一筆外快，就記上來吧。</div>';}
  else{$('list').innerHTML=sorted.map(e=>{
    const del=confirmId===e.id?'<span class="del"><button class="yes" data-del="'+e.id+'">刪</button><button data-cancel="1">取消</button></span>':'<button class="x" data-confirm="'+e.id+'">&times;</button>';
    const note=(e.note||'外快').replace(/&/g,'&amp;').replace(/</g,'&lt;');
    return '<div class="entry"><span class="e-date">'+e.date.slice(5)+'</span><span class="e-note">'+note+'</span><span class="e-amt">+'+fmt(e.amount)+'</span>'+del+'</div>';}).join('');}
}
function add(){const a=parseFloat($('amount').value);if(!a||a<=0){setErr('請輸入金額');return;}
  entries.push({id:Date.now()+'_'+Math.random().toString(36).slice(2,6),date:$('date').value||todayStr(),amount:a,note:$('note').value.trim()});
  save();setErr('');$('amount').value='';$('note').value='';$('date').value=todayStr();render();}
$('list').addEventListener('click',ev=>{const t=ev.target;
  if(t.dataset.confirm){confirmId=t.dataset.confirm;render();}
  else if(t.dataset.del){entries=entries.filter(e=>e.id!==t.dataset.del);confirmId=null;save();render();}
  else if(t.dataset.cancel){confirmId=null;render();}});
$('addbtn').addEventListener('click',add);
$('exportbtn').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='外快基金備份_'+todayStr()+'.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);});
$('importbtn').addEventListener('click',()=>$('importfile').click());
$('importfile').addEventListener('change',ev=>{const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
    if(Array.isArray(d)){if(confirm('匯入會覆蓋目前的資料，確定？')){entries=d;save();render();}}else setErr('檔案格式不對');}
    catch(e){setErr('讀取失敗');}};r.readAsText(f);ev.target.value='';});
$('date').value=todayStr();load();render();
</script>
</body>
</html>
